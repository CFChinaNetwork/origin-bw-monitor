name = "origin-bw-monitor"
main = "src/index.js"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# ── Observability ─────────────────────────────────────────────
[observability]
[observability.logs]
enabled         = true
invocation_logs = true

# ── Cron 调度 ─────────────────────────────────────────────────
# 1. 每20分钟重试因 lag 窗口被延迟的 pending 文件（确保数据不丢失）
# 2. 每天 UTC 02:00 清理 D1 过期数据（7天保留期）
[triggers]
crons = ["*/20 * * * *", "0 2 * * *"]

# ── R2 存储桶（Logpush 同一个桶，R2 Binding 只读）─────────────
# binding 不要改；bucket_name 改为你的 Logpush R2 桶名
[[r2_buckets]]
binding     = "LOGPUSH_BUCKET"
bucket_name = "cdn-logs-raw"

# ── D1 数据库 ─────────────────────────────────────────────────
[[d1_databases]]
binding       = "DB"
database_name = "bw-stats"
database_id   = "a0546e2b-0487-4124-b4ac-6dad1aa079eb"

# ── Queue（由 R2 Event Notification 触发，Worker 消费）────────
[[queues.producers]]
binding = "INGEST_QUEUE"
queue   = "bw-ingest-queue"

[[queues.consumers]]
queue             = "bw-ingest-queue"
max_batch_size    = 3
max_batch_timeout = 30
max_retries       = 3
dead_letter_queue = "bw-ingest-dlq"

[limits]
cpu_ms = 300000

# ── 配置变量（全部在此，index.js 永不需要修改）────────────────
[vars]
LOG_LEVEL = "info"

# Logpush 写入 R2 的路径前缀
LOG_PREFIX = "logs/"

# Safe Lag Window（分钟）：等待该分钟内所有 Logpush 文件全部落盘
# 建议不低于 10 分钟
LAG_MINUTES = "10"

# processing 状态超时（分钟），超时则认为 Worker 崩溃，允许重试
MAX_PROCESSING_MIN = "15"

# D1 数据保留天数，每日 UTC 02:00 自动清理
DATA_RETENTION_DAYS = "7"

# Dashboard 访问鉴权（留空 = 不鉴权）
# 生产环境建议：wrangler secret put DASHBOARD_TOKEN
DASHBOARD_TOKEN = ""

# ── 告警配置（留空 = 不启用该告警机制）──────────────────────
# 固定阈值告警（Mbps），超过即告警，例如 "500"
ALERT_THRESHOLD_MBPS = "0.1"

# 突增倍数告警（与过去24小时最高值对比），例如 "5"
ALERT_SPIKE_MULTIPLIER = "2"

# 同 zone 同类告警的冷却时间（分钟），防止告警风暴
ALERT_COOLDOWN_MIN = "30"

# 告警消息里的面板跳转链接（留空则不显示）
ALERT_DASHBOARD_URL = "https://origin-bw-monitor.steve-account-test.workers.dev"

# ── 告警渠道（通过 wrangler secret put 设置，不写在此文件）────
# 企业微信：wrangler secret put ALERT_WEBHOOK_WECOM
# 钉钉：    wrangler secret put ALERT_WEBHOOK_DINGTALK
# 飞书：    wrangler secret put ALERT_WEBHOOK_FEISHU
